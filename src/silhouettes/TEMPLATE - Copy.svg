<?xml version="1.0" encoding="UTF-8"?>
<!--
  SILHOUETTE DRAWING TEMPLATE
  Vampire Clan Select Screen — AI 201

  PRINT THIS. DRAW ON IT. PHOTOGRAPH IT.

  Aspect ratio: 1:2 (matches the app's 200x400 viewBox)
  Print size: 4" x 8" on letter paper (landscape, centered)

  RULES:
  - Feet MUST touch the bottom edge (the red line)
  - Eye line sits on the blue guide at 14% from top
  - Body mass stays inside the green safe area
  - Accents (weapons, coat tails, horns) can extend outside
  - Draw on WHITE paper with DARK media (the app inverts nothing)
  - Background will be removed — draw the figure only

  VALUE RANGE (Pass 1 — monochrome):
  - Darkest body fill: near-black
  - Lightest interior detail: dark grey (subtle clothing, hair)
  - NO bright highlights yet (that's Pass 3)
  - The figure should read as a dark shape with interior texture

  AFTER DRAWING:
  1. Photograph with phone (even lighting, straight-on, no shadow)
  2. Crop tight to the template border (red outer frame)
  3. Remove the white background (make transparent PNG)
     - Use remove.bg, Photoshop, or any background remover
  4. Save as: nosferatu.png, brujah.png, etc.
  5. Drop into src/silhouettes/art/
  6. The app picks it up automatically. No code changes.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 1200"
     width="4in" height="8in"
     style="background: white">

  <!-- Outer frame (crop to this) -->
  <rect x="0" y="0" width="600" height="1200"
        fill="none" stroke="#cc3333" stroke-width="2"/>

  <!-- 10% grid -->
  <g stroke="#ddd" stroke-width="0.5">
    <!-- Horizontal -->
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="480" x2="600" y2="480"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="720" x2="600" y2="720"/>
    <line x1="0" y1="840" x2="600" y2="840"/>
    <line x1="0" y1="960" x2="600" y2="960"/>
    <line x1="0" y1="1080" x2="600" y2="1080"/>
    <!-- Vertical -->
    <line x1="60" y1="0" x2="60" y2="1200"/>
    <line x1="120" y1="0" x2="120" y2="1200"/>
    <line x1="180" y1="0" x2="180" y2="1200"/>
    <line x1="240" y1="0" x2="240" y2="1200"/>
    <line x1="300" y1="0" x2="300" y2="1200"/>
    <line x1="360" y1="0" x2="360" y2="1200"/>
    <line x1="420" y1="0" x2="420" y2="1200"/>
    <line x1="480" y1="0" x2="480" y2="1200"/>
    <line x1="540" y1="0" x2="540" y2="1200"/>
  </g>

  <!-- Center line (vertical) -->
  <line x1="300" y1="0" x2="300" y2="1200"
        stroke="#aaa" stroke-width="1" stroke-dasharray="8 4"/>

  <!-- EYE LINE — 14% from top = Y168 -->
  <line x1="0" y1="168" x2="600" y2="168"
        stroke="#3366cc" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="605" y="172" font-family="Arial" font-size="14" fill="#3366cc">EYE LINE (14%)</text>

  <!-- SHOULDER LINE — ~22% = Y264 -->
  <line x1="0" y1="264" x2="600" y2="264"
        stroke="#6699cc" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="605" y="268" font-family="Arial" font-size="11" fill="#6699cc">SHOULDERS (22%)</text>

  <!-- WAIST LINE — 50% = Y600 -->
  <line x1="0" y1="600" x2="600" y2="600"
        stroke="#6699cc" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="605" y="604" font-family="Arial" font-size="11" fill="#6699cc">WAIST (50%)</text>

  <!-- KNEE LINE — 75% = Y900 -->
  <line x1="0" y1="900" x2="600" y2="900"
        stroke="#6699cc" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="605" y="904" font-family="Arial" font-size="11" fill="#6699cc">KNEES (75%)</text>

  <!-- FEET LINE — bottom edge = Y1200 -->
  <line x1="0" y1="1198" x2="600" y2="1198"
        stroke="#cc3333" stroke-width="3"/>
  <text x="605" y="1198" font-family="Arial" font-size="14" fill="#cc3333" font-weight="bold">FEET HERE</text>

  <!-- Safe area for body mass (inner rectangle) -->
  <rect x="120" y="100" width="360" height="1050"
        fill="none" stroke="#33aa55" stroke-width="1" stroke-dasharray="10 5" opacity="0.5"/>
  <text x="125" y="95" font-family="Arial" font-size="11" fill="#33aa55">BODY SAFE AREA</text>

  <!-- Percentage labels along left edge -->
  <g font-family="Arial" font-size="11" fill="#999">
    <text x="3" y="14">0%</text>
    <text x="3" y="132">10%</text>
    <text x="3" y="252">20%</text>
    <text x="3" y="372">30%</text>
    <text x="3" y="492">40%</text>
    <text x="3" y="612">50%</text>
    <text x="3" y="732">60%</text>
    <text x="3" y="852">70%</text>
    <text x="3" y="972">80%</text>
    <text x="3" y="1092">90%</text>
    <text x="3" y="1195">100%</text>
  </g>

  <!-- Title block -->
  <text x="300" y="30" font-family="Arial" font-size="16" fill="#666"
        text-anchor="middle" font-weight="bold">CLAN: _______________</text>
  <text x="300" y="50" font-family="Arial" font-size="11" fill="#999"
        text-anchor="middle">Draw dark figure on white. Feet on red line. Eyes on blue line.</text>
</svg>
